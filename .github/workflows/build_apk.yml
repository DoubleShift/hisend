name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.4'
        channel: 'stable'
        cache: true
    
    - name: Set ANDROID_NDK_HOME
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk | sort -V | tail -1)" >> $GITHUB_ENV
    
    - name: Create signing keystore
      run: |
        keytool -genkey -v \
          -keystore app/android/app/upload-keystore.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias upload \
          -storepass android -keypass android \
          -dname "CN=Trae, OU=AI, O=AI, L=BJ, ST=BJ, C=CN"
    
    - name: Create key.properties
      run: |
        echo "storeFile=upload-keystore.jks" > app/android/key.properties
        echo "keyAlias=upload" >> app/android/key.properties
        echo "keyPassword=android" >> app/android/key.properties
        echo "storePassword=android" >> app/android/key.properties
    
    - name: Install Flutter dependencies
      run: flutter pub get
      working-directory: app
    
    - name: Generate code
      run: dart run build_runner build -d
      working-directory: app
    
    - name: Build APK
      run: flutter build apk --release
      working-directory: app
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: localsend-app.apk
        path: app/build/app/outputs/flutter-apk/app-release.apk